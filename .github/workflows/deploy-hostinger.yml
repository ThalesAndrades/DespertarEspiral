name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & FTPS upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://despertarespiral.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build for production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sanity check - .htaccess presente no dist
        run: |
          if [ ! -f dist/.htaccess ]; then
            echo "::error::dist/.htaccess não encontrado - public/.htaccess deveria ter sido copiado pelo Vite."
            exit 1
          fi
          ls -la dist | head -40

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            **/*.map

      - name: Smoke test (HTTP 200 no apex)
        run: |
          set -e
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://despertarespiral.com/ || true)
            if [ "$code" = "200" ]; then echo "OK ($code)"; exit 0; fi
            echo "Tentativa $i: HTTP $code, tentando novamente em 10s..."
            sleep 10
          done
          echo "::error::Smoke test falhou após deploy"
          exit 1
